name: Feature request
description: 提议新功能或改进
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前检查
      options:
        - label: 我已搜索现有 Issue。
          required: true
        - label: 该建议不用于欺骗、作弊、追踪他人或绕过安全控制。
          required: true
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: 安全和隐私影响
      description: 是否会改变证书、VPN、代理域名或用户数据的处理方式？
    validations:
      required: true
